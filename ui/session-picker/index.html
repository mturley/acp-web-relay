<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ACP Web Relay</title>
  <link rel="stylesheet" href="/session-picker/style.css">
</head>
<body>
  <header>
    <h1>ACP Relay</h1>
    <div id="connection-status" class="status-dot disconnected" title="Disconnected"></div>
  </header>
  <main id="sessions-container">
    <div id="empty-state" class="empty-state">
      <p>No active sessions</p>
      <p class="hint">Start an agent session in your editor to see it here.</p>
    </div>
  </main>
  <script src="/session-picker/script.js"></script>
</body>
</html>
