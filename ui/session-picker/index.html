<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ACP Web Relay</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/session-picker/style.css">
</head>
<body>
  <div class="app">
    <header>
      <button id="sidebar-toggle" class="sidebar-toggle" title="Toggle session list">
        <span class="hamburger-icon">&#9776;</span>
        <span id="session-badge" class="session-badge" style="display: none;">0</span>
      </button>
      <h1>ACP Web Relay</h1>
      <div class="header-right">
        <div id="connection-status" class="status-dot disconnected" title="Disconnected"></div>
        <button id="logout-btn" class="logout-btn" title="Log out">Log out</button>
      </div>
    </header>
    <div class="content">
      <aside id="sidebar" class="sidebar">
        <div id="sessions-container"></div>
      </aside>
      <main id="main-area" class="main-area">
        <div id="welcome" class="welcome">
          <p>Select a session to view it.</p>
        </div>
        <iframe id="session-frame" class="session-frame"></iframe>
      </main>
    </div>
  </div>
  <script src="/session-picker/script.js"></script>
</body>
</html>
