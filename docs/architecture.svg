<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14">
  <defs>
    <marker id="arrow-right" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-left" markerWidth="8" markerHeight="8" refX="1" refY="4" orient="auto">
      <path d="M7,1 L1,4 L7,7" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-down" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Daemon box -->
  <rect x="210" y="20" width="300" height="240" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="360" y="50" text-anchor="middle" font-weight="600" font-size="16" fill="#e2e8f0">acp-web-relay</text>
  <text x="360" y="70" text-anchor="middle" font-size="12" fill="#64748b">(daemon)</text>

  <!-- Agent Pipe box -->
  <rect x="260" y="110" width="200" height="44" rx="8" fill="#0c4a6e" stroke="#0284c7" stroke-width="1.2"/>
  <text x="360" y="138" text-anchor="middle" font-weight="500" fill="#7dd3fc">Agent Pipe</text>

  <!-- Web UI box -->
  <rect x="260" y="190" width="200" height="44" rx="8" fill="#0c4a6e" stroke="#0284c7" stroke-width="1.2"/>
  <text x="360" y="218" text-anchor="middle" font-weight="500" fill="#7dd3fc">Web UI</text>

  <!-- Editor box -->
  <rect x="20" y="100" width="130" height="64" rx="10" fill="#14532d" stroke="#22c55e" stroke-width="1.2"/>
  <text x="85" y="126" text-anchor="middle" font-weight="600" fill="#86efac">Editor</text>
  <text x="85" y="146" text-anchor="middle" font-size="12" fill="#4ade80">Zed, IDEA, etc.</text>

  <!-- ACP Agent box -->
  <rect x="570" y="100" width="130" height="64" rx="10" fill="#78350f" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="635" y="126" text-anchor="middle" font-weight="600" fill="#fcd34d">ACP Agent</text>
  <text x="635" y="146" text-anchor="middle" font-size="11" fill="#fbbf24">Claude Code, etc.</text>

  <!-- Browser box -->
  <rect x="295" y="340" width="130" height="54" rx="10" fill="#3b0764" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="360" y="374" text-anchor="middle" font-weight="600" fill="#c4b5fd">Browser</text>

  <!-- Editor <-> Agent Pipe (IPC) -->
  <line x1="150" y1="132" x2="252" y2="132" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow-right)" marker-start="url(#arrow-left)"/>
  <rect x="170" y="115" width="32" height="18" rx="4" fill="#1e293b" stroke="#475569" stroke-width="0.8"/>
  <text x="186" y="128" text-anchor="middle" font-size="10" fill="#94a3b8" font-weight="500">IPC</text>

  <!-- Agent Pipe <-> ACP Agent (stdio) -->
  <line x1="468" y1="132" x2="562" y2="132" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow-right)" marker-start="url(#arrow-left)"/>
  <rect x="490" y="115" width="42" height="18" rx="4" fill="#1e293b" stroke="#475569" stroke-width="0.8"/>
  <text x="511" y="128" text-anchor="middle" font-size="10" fill="#94a3b8" font-weight="500">stdio</text>

  <!-- Web UI -> Browser (WebSocket) -->
  <line x1="360" y1="234" x2="360" y2="332" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow-down)"/>
  <rect x="318" y="276" width="84" height="18" rx="4" fill="#1e293b" stroke="#475569" stroke-width="0.8"/>
  <text x="360" y="289" text-anchor="middle" font-size="10" fill="#94a3b8" font-weight="500">WebSocket</text>
</svg>
